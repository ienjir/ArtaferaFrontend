name: Deploy Artafera Frontend
on:
  push:
    branches: [ main, ArtdisplayPage ]
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo 'SSH connection successful'"

      - name: Create deployment directory
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            mkdir -p /var/www/artafera/frontend
          "

      - name: Copy files to server
        run: |
          # Copy all files except .git
          rsync -avz --exclude='.git' --exclude='node_modules' --exclude='dist' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/artafera/frontend/

      - name: Deploy with Docker
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            cd /var/www/artafera/frontend

            # Build new image
            docker build -t artafera-frontend:latest .

            # Stop and remove old container if exists
            docker stop artafera-frontend || true
            docker rm artafera-frontend || true

            # Run new container
            docker run -d \
              --name artafera-frontend \
              --restart unless-stopped \
              -p 4000:4000 \
              -e NODE_ENV=production \
              artafera-frontend:latest

            # Clean up old images (keep last 2)
            docker image prune -f
            docker images artafera-frontend --format 'table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.CreatedAt}}' | tail -n +3 | head -n -2 | awk '{print \$3}' | xargs -r docker rmi || true
          "

      - name: Verify deployment
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            # Wait for container to be ready
            sleep 10

            # Check if container is running
            if docker ps | grep -q 'artafera-frontend'; then
              echo '✅ Docker container is running'
            else
              echo '❌ Docker container is not running'
              docker logs artafera-frontend || true
              exit 1
            fi

            # Check if application is responding
            if curl -f http://localhost:4000 > /dev/null 2>&1; then
              echo '✅ Application is responding'
            else
              echo '❌ Application is not responding'
              docker logs artafera-frontend || true
              exit 1
            fi
          "
          echo "✅ Deployment pipeline completed!"
