@if (images && images.length > 0) {
  <ngb-carousel class="carousel" [showNavigationArrows]="true" [showNavigationIndicators]="false" >
    @for (slide of images; track $index) {
      <ng-template ngbSlide class="carousel-template">
        <div class="picsum-img-wrapper carousel-image">
          <img [ngSrc]="slide" fill alt="Random slide"/>
        </div>
      </ng-template>
    }
  </ngb-carousel>
}
