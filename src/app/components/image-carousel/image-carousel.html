<div class="carousel"
     (mouseenter)="onMouseEnter()"
     (mouseleave)="onMouseLeave()">
  <div class="carousel-inner">
    @for (slide of slides(); track slide.id; let idx = $index) {
      <div class="carousel-item" [class]="getSlideClass(idx)">
        <img [ngSrc]="slide.image" [class.carousel-item--darkened]="darkened()" [alt]="slide.caption" width="1920" height="1080" sizes="100vw" priority>
      </div>
    }
  </div>

  @if (manualSwap()) {
    <button class="prev" (click)="prevSlide()">&#10094;</button>
    <button class="next" (click)="nextSlide()">&#10095;</button>
  }

  <div class="carousel-indicators">
    @for (slide of slides(); track slide.id; let idx = $index) {
      <div class="indicator"
           [class.active]="idx === currentSlideIndex()"
           (click)="goToSlide(idx)"></div>
    }
  </div>
</div>
