<div class="page">
    <div class="page__section page__section--v-centered page__section--m-hidden">
        <img class="rounded-image__image" ngSrc="/pictures/DingDong.jpg" width="3872" height="2592" alt="Rounded Image" priority>
    </div>

    <div class="page__section page--h-centered page--v-centered">
        <div class="artafera-card">
            <h2>{{ 'TL-CON_Title' | transloco }}</h2>
            <form [formGroup]="contactForm" class="contact-container__contact__form" (ngSubmit)="submitContact()">
                <InputWrapper [label]="'TL-CON_Email' | transloco" type="text" [errorMessage]="emailError">
                    <input #input id="email" type="text" formControlName="email">
                </InputWrapper>
                <InputWrapper [label]="'TL-CON_Message' | transloco" type="text" [errorMessage]="messageError" [resizable]="true">
                    <textarea #textarea id="message" formControlName="message"></textarea>
                </InputWrapper>
                <div class="contact-container__contact__button-container">
                    <button type="submit" [disabled]="contactForm.invalid || isSubmitting()">{{ 'TL-CON_Send' | transloco }}</button>
                </div>
            </form>
        </div>
    </div>
</div>
<div style="height: 200vh"></div>
<a href="/">test</a>
